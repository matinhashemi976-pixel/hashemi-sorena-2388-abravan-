<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=0.6">
<title>فروشگاه میر جلیل هاشمی</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;600;700&display=swap');

*{margin:0;padding:0;box-sizing:border-box;font-family:Vazirmatn}
body{background:#f4f6f8}

/* HEADER */
header{
background:linear-gradient(135deg,#b71c1c,#e53935);
color:white;
text-align:center;
padding:14px;
font-weight:700;
}

/* SINGLE SLIDER */
.slider{
width:100%;
height:220px;
overflow:hidden;
}

.slider img{
width:100%;
height:220px;
object-fit:cover;
}

/* NAV */
nav{
background:#111;
display:flex;
justify-content:center;
gap:15px;
padding:10px;
position:sticky;
top:0;
z-index:999;
}

nav a{
color:white;
text-decoration:none;
font-size:15px;
padding:5px 8px;
border-radius:6px;
}
nav a:hover{background:#e53935}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
gap:8px;
padding:8px;
}

/* CARD */
.card{
background:#fff;
border-radius:2px;
overflow:hidden;
box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

.card img{
width:100%;
height:75px;
object-fit:contain;
background:#f2f2f2;
}

.card-body{
padding:5px;
text-align:center;
}

.name{font-size:10px;font-weight:700}
.old{font-size:9px;color:#888;text-decoration:line-through}
.price{font-size:11px;font-weight:700;color:#1b5e20}

.btn-cart{
margin-top:4px;
width:100%;
padding:4px;
font-size:10px;
border:none;
background:#111;
color:white;
border-radius:5px;
cursor:pointer;
}
.btn-cart:hover{background:#e53935}

/* NOTIFY */
.notify{
position:fixed;
top:-120px;
left:50%;
transform:translateX(-50%);
background:#111;
color:white;
padding:14px;
border-radius:10px;
width:90%;
max-width:420px;
transition:0.4s;
z-index:99999;
font-size:12px;
line-height:1.6;
}

.notify.show{top:20px}

/* FOOTER */
footer{
background:#111;
color:white;
text-align:center;
padding:15px;
font-size:12px;
}

.security{
background:#1b5e20;
color:white;
text-align:center;
padding:8px;
font-size:11px;
}
</style>
</head>

<body>

<header>فروشگاه میر جلیل هاشمی</header>

<!-- SINGLE SLIDER -->
<div class="slider">
<img src="kand2.jpg" alt="banner">
</div>

<!-- PRODUCTS -->
<div class="products">

<div class="card">
<img src="PCH PCH.jpg">
<div class="card-body">
<div class="name"> پچ پچ شکلاتی </div>
<div class="old">35,000</div>
<div class="price">25,000</div>
<button class="btn-cart">خرید حضوری</button>
</div>
</div>

<div class="card">
<img src="hed kol.png">
<div class="card-body">
<div class="name">شامپو هد اند شولدر </div>
<div class="old">1,200,000</div>
<div class="price">550,000</div>
<button class="btn-cart">خرید حضوری</button>
</div>
</div>

<div class="card">
<img src="hashemi.jpg">
<div class="card-body">
<div class="name">برنج</div>
<div class="old">520,000</div>
<div class="price">500,000</div>
<button class="btn-cart">خرید حضوری</button>
</div>
</div>

<div class="card">
<img src="POLAK.jpg">
<div class="card-body">
<div class="name"> تن ماهی پولک </div>
<div class="old">200,000</div>
<div class="price">170,000</div>
<button class="btn-cart">خرید حضوری</button>
</div>
</div>

<!-- BOXES -->
<script>
for(let i=0;i<40;i++){
document.write(`
<div class="card">
<img src="">
<div class="card-body">
<div class="name">محصول خالی</div>
<div class="old">---</div>
<div class="price">---</div>
<button class="btn-cart">خرید حضوری</button>
</div>
</div>
`);
}
</script>

</div>

<!-- NOTIFY -->
<div class="notify" id="notify">
🤖 اطلاع سیستم: خرید این سایت فقط به صورت حضوری می‌باشد.
</div>

<footer>فروشگاه میر جلیل هاشمی</footer>

<div class="security">🔒 گروه متعهد</div>

<script>

let notify=document.getElementById("notify");

function showNotify(){
notify.classList.add("show");
setTimeout(()=>notify.classList.remove("show"),3500);
}

document.querySelectorAll(".btn-cart").forEach(btn=>{
btn.addEventListener("click",showNotify);
});

</script>

</body>
</html>
