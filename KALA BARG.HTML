<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=0.6">

<title>استعلام کالابرگ | فروشگاه میر جلیل هاشمی</title>

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;700;900&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Vazirmatn',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
    linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.45)),
    linear-gradient(135deg,#ff512f,#dd2476);
}

.card{
    width:90%;
    max-width:500px;
    background:#fff;
    border-radius:25px;
    padding:40px 30px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,.25);
}

.logo{
    width:90px;
    height:90px;
    margin:auto;
    border-radius:50%;
    background:linear-gradient(135deg,#ff6a00,#ff0000);
    display:flex;
    align-items:center;
    justify-content:center;
    color:#fff;
    font-size:38px;
    font-weight:900;
    margin-bottom:20px;
}

.shop-name{
    font-size:30px;
    font-weight:900;
    color:#222;
}

.subtitle{
    color:#666;
    margin-top:8px;
    font-size:15px;
}

.line{
    width:80px;
    height:4px;
    background:#ff4b2b;
    margin:20px auto;
    border-radius:20px;
}

.title{
    font-size:24px;
    font-weight:800;
    color:#333;
    margin-bottom:10px;
}

.desc{
    color:#666;
    line-height:2;
    margin-bottom:25px;
}

.btn{
    display:inline-block;
    text-decoration:none;
    background:linear-gradient(135deg,#ff6a00,#ff0000);
    color:#fff;
    padding:16px 35px;
    border-radius:15px;
    font-size:18px;
    font-weight:700;
    transition:.3s;
    box-shadow:0 8px 20px rgba(255,80,0,.3);
}

.btn:hover{
    transform:translateY(-3px);
}

.footer{
    margin-top:25px;
    color:#888;
    font-size:13px;
}
</style>
</head>
<body>

<div class="card">

    <div class="logo">م</div>

    <h1 class="shop-name">فروشگاه میر جلیل هاشمی</h1>

    <p class="subtitle">
        مرکز عرضه کالاهای اساسی و طرح کالابرگ الکترونیکی
    </p>

    <div class="line"></div>

    <h2 class="title">استعلام کالابرگ</h2>

    <p class="desc">
        برای مشاهده موجودی اعتبار کالابرگ و خدمات مربوطه،
        روی دکمه زیر کلیک کنید.
    </p>

    <a class="btn" href="https://ble.ir/6369">
        استعلام کالابرگ
    </a>

    <div class="footer">
        © فروشگاه میر جلیل هاشمی
    </div>

</div>

</body>
</html>
